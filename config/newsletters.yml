# Registry of every newsletter the digest tracks.
#
# Sender patterns below are the REAL From-addresses the user confirmed after
# subscribing (2026-07). Some newsletters share a sending address, so those are
# disambiguated by the subject line:
#   - TLDR / TLDR AI / TLDR Crypto all come from dan@tldrnewsletter.com
#   - CoinDesk Daybook & Headlines both come from newsletters@coindesk.com
#   - Several AI/stocks newsletters share @mail.beehiiv.com but have distinct
#     local parts (ultrathink@, agentai@, aidailybrief@, opening-bell@), so the
#     full local+domain is matched.
#
# Fields per entry:
#   id / name / category / batch / cadence / url  — as before
#   senders:          substrings matched (case-insensitively) against the email
#                     "From" address. Prefer the full local@domain when a domain
#                     is shared by several newsletters.
#   subject_contains: (optional) ALL-of-none / any-of filter — the subject must
#                     contain at least one of these.
#   subject_excludes: (optional) reject the email if the subject contains any of
#                     these (used to carve "plain TLDR" out from "TLDR AI"/etc.).
#
# After the first real emails arrive, run `python -m src.list_senders` to
# confirm every newsletter is matching (esp. the subject-based ones).

batches:
  stocks-am:
    deadline_et: "09:15"
    label: "Morning Stocks"
  crypto-am:
    deadline_et: "09:30"
    label: "Morning Crypto"
  ai-am:
    deadline_et: "10:00"
    label: "Morning AI"
  tech-am:
    deadline_et: "10:00"
    label: "Morning Tech"
  crypto-pm:
    deadline_et: "19:00"
    label: "Evening Crypto"
  ai-pm:
    deadline_et: "22:00"
    label: "Evening AI"

newsletters:
  # ---------- AI — morning batch (by 10:00 AM ET) ----------
