    name: "Everyday AI"
    category: ai
    batch: ai-pm
    cadence: daily
    senders: ["youreverydayai", "everydayai"]
    url: https://read.youreverydayai.com/

  - id: lennys-newsletter
    name: "Lenny's Newsletter"
    category: ai
    batch: ai-pm
    cadence: weekly
    senders: ["lennysnewsletter", "lenny@substack"]
    url: https://www.lennysnewsletter.com/

  - id: the-batch
    name: "The Batch (DeepLearning.AI)"
