# Registry of every newsletter the digest tracks.
#
# Fields per entry:
#   id:               short unique slug (used in filenames and state tracking)
#   name:             display name shown on the website and in alert emails
#   category:         ai | crypto | stocks
#   batch:            which scheduled run this newsletter belongs to
#   cadence:          daily | weekly  (weekly gets a longer inbox lookback and
#                     is skipped without complaint when no new issue exists)
#   senders:          substrings matched case-insensitively against the email
#                     "From" header. After you subscribe, run
#                     `python -m src.list_senders` to see the real addresses
#                     and correct these if needed.
#   subject_contains: (optional) extra filter on the subject line — needed when
#                     two newsletters share one sender (TLDR, CoinMarketCap).
#   url:              the newsletter's homepage, linked from the site.

batches:
  stocks-am:
    deadline_et: "09:15"
    label: "Morning Stocks"
  crypto-am:
    deadline_et: "09:30"
    label: "Morning Crypto"
  ai-am:
    deadline_et: "10:00"
    label: "Morning AI"
  crypto-pm:
    deadline_et: "19:00"
    label: "Evening Crypto"
  ai-pm:
    deadline_et: "22:00"
    label: "Evening AI"

newsletters:
  # ---------- AI — morning batch (by 10:00 AM ET) ----------
  - id: the-neuron
    name: "The Neuron"
    category: ai
    batch: ai-am
    cadence: daily
    senders: ["theneuron", "theneurondaily"]
    url: https://www.theneurondaily.com/

  - id: rundown-ai
    name: "The Rundown AI"
    category: ai
    batch: ai-am
    cadence: daily
    senders: ["therundown"]
    url: https://www.therundown.ai/

  - id: superhuman
    name: "Superhuman (Zain Kahn)"
    category: ai
    batch: ai-am
    cadence: daily
    senders: ["superhuman"]
    url: https://www.superhuman.ai/

  - id: tldr-ai
    name: "TLDR AI"
    category: ai
    batch: ai-am
    cadence: daily
    senders: ["tldrnewsletter", "tldr.tech"]
    subject_contains: ["TLDR AI"]
    url: https://tldr.tech/ai

  - id: bens-bites
    name: "Ben's Bites"
    category: ai
    batch: ai-am
    cadence: daily
    senders: ["bensbites"]
    url: https://www.bensbites.com/

  # ---------- AI — evening batch (by 10:00 PM ET) ----------
